name: Deploy Next.js to EKS

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-nextjs.yaml"
      - "infra/cdk/**"
      - "infra/helm/nextjs-server/**"
      - "web/**"
      - "web_db/**"
      - "web_utils/**"
      - "package.json"
      - "package-lock.json"
      - "plan.md"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: transit-planner-eks
  NAMESPACE: apps
  RELEASE_NAME: nextjs-server
  CHART_PATH: infra/helm/nextjs-server
  ECR_REPO_NAME: transit-planner
  K8S_ENV_SECRET_NAME: nextjs-server-db
  APP_DATABASE_URL_KEY: DATABASE_URL_WEB

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::764933859140:role/transit-planner-eks-github-actions
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.run_attempt }}
          mask-aws-account-id: false
          unset-current-credentials: true
          disable-retry: true

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}-nextjs
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/${{ env.ECR_REPO_NAME }}:$IMAGE_TAG"

          docker build \
            -f Dockerfile.web \
            -t "$IMAGE_URI" \
            .

          docker push "$IMAGE_URI"

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_REPO=$ECR_REGISTRY/${{ env.ECR_REPO_NAME }}" >> $GITHUB_ENV

      - name: Configure kubectl for EKS
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "${{ env.CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"
          kubectl get nodes

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Reconcile app env secret from GitHub Actions secrets
        shell: bash
        env:
          DATABASE_URL_WEB: ${{ secrets.SUPABASE_DB_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BACKBOARD_API_KEY: ${{ secrets.BACKBOARD_API_KEY }}
          BACKBOARD_KEY: ${{ secrets.BACKBOARD_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
        run: |
          set -euo pipefail

          EFFECTIVE_BACKBOARD_API_KEY="${BACKBOARD_API_KEY:-}"
          if [ -z "${EFFECTIVE_BACKBOARD_API_KEY}" ]; then
            EFFECTIVE_BACKBOARD_API_KEY="${BACKBOARD_KEY:-}"
          fi

          if [ -z "${DATABASE_URL_WEB:-}" ] || \
             [ -z "${AUTH_SECRET:-}" ] || \
             [ -z "${SUPABASE_URL:-}" ] || \
             [ -z "${SUPABASE_KEY:-}" ] || \
             [ -z "${GOOGLE_MAPS_API_KEY:-}" ] || \
             [ -z "${NEXT_PUBLIC_MAPBOX_TOKEN:-}" ] || \
             [ -z "${EFFECTIVE_BACKBOARD_API_KEY:-}" ]; then
            echo "One or more required GitHub Actions secrets are missing."
            echo "Required: SUPABASE_DB_URL, AUTH_SECRET, SUPABASE_URL, SUPABASE_KEY, GOOGLE_MAPS_API_KEY, NEXT_PUBLIC_MAPBOX_TOKEN, and BACKBOARD_API_KEY (or BACKBOARD_KEY)."
            exit 1
          fi

          ENV_FILE_CONTENT="$(printf 'NODE_ENV=production\nAUTH_SECRET=%s\n%s=%s\nSUPABASE_URL=%s\nSUPABASE_KEY=%s\nSUPABASE_DB_URL=%s\nBACKBOARD_API_KEY=%s\nGOOGLE_MAPS_API_KEY=%s\nNEXT_PUBLIC_MAPBOX_TOKEN=%s' \
            "${AUTH_SECRET}" \
            "${{ env.APP_DATABASE_URL_KEY }}" "${DATABASE_URL_WEB}" \
            "${SUPABASE_URL}" \
            "${SUPABASE_KEY}" \
            "${DATABASE_URL_WEB}" \
            "${EFFECTIVE_BACKBOARD_API_KEY}" \
            "${GOOGLE_MAPS_API_KEY}" \
            "${NEXT_PUBLIC_MAPBOX_TOKEN}")"

          kubectl create secret generic "${{ env.K8S_ENV_SECRET_NAME }}" \
            -n "${{ env.NAMESPACE }}" \
            --from-literal=.env="${ENV_FILE_CONTENT}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          set -euo pipefail

          helm upgrade --install "${{ env.RELEASE_NAME }}" "${{ env.CHART_PATH }}" \
            --namespace "${{ env.NAMESPACE }}" --create-namespace \
            --set nameOverride=nextjs-server \
            --set image.repository="${{ env.IMAGE_REPO }}" \
            --set image.tag="${{ env.IMAGE_TAG }}" \
            --set service.targetPort=3000 \
            --set envFile.existingSecretName=nextjs-server-db
