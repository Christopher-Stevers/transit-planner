name: Deploy Python to EKS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CFN_STACK_NAME: TransitPlannerStack
  CLUSTER_NAME: transit-planner-eks
  NAMESPACE: apps
  RELEASE_NAME: python-server
  CHART_PATH: infra/helm/python-server
  ECR_REPO_NAME: transit-planner
  DB_URL_SECRET_OUTPUT_KEY: PythonDatabaseUrlSecretArn
  K8S_ENV_SECRET_NAME: python-server-db

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug GitHub context (pre-OIDC)
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "workflow=${{ github.workflow }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_attempt=${{ github.run_attempt }}"

      - name: Debug OIDC claims (inline)
        shell: bash
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC env vars are missing. Ensure permissions.id-token=write is set at workflow/job level."
            exit 1
          fi

          RESP="$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          TOKEN="$(echo "$RESP" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')"

          if [ -z "${TOKEN:-}" ]; then
            echo "Failed to obtain OIDC token response:"
            echo "$RESP"
            exit 1
          fi

          PAYLOAD_B64="$(echo "$TOKEN" | cut -d '.' -f2)"
          PAD=$(( (4 - ${#PAYLOAD_B64} % 4) % 4 ))
          if [ "$PAD" -gt 0 ]; then
            PAYLOAD_B64="${PAYLOAD_B64}$(printf '=%.0s' $(seq 1 $PAD))"
          fi

          PAYLOAD_JSON="$(echo "$PAYLOAD_B64" | tr '_-' '/+' | base64 -d 2>/dev/null || true)"
          if [ -z "${PAYLOAD_JSON:-}" ]; then
            echo "Failed to decode JWT payload"
            exit 1
          fi

          echo "OIDC payload:"
          echo "$PAYLOAD_JSON"

          echo "Extracted claims:"
          echo "$PAYLOAD_JSON" | sed -n 's/.*"aud":"\([^"]*\)".*/aud=\1/p'
          echo "$PAYLOAD_JSON" | sed -n 's/.*"sub":"\([^"]*\)".*/sub=\1/p'
          echo "$PAYLOAD_JSON" | sed -n 's/.*"iss":"\([^"]*\)".*/iss=\1/p'

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::764933859140:role/transit-planner-eks-github-actions
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.run_attempt }}
          mask-aws-account-id: false
          unset-current-credentials: true
          disable-retry: true

      - name: Debug caller identity (post-OIDC)
        run: |
          set -euo pipefail
          aws --version
          aws sts get-caller-identity

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}-python
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/${{ env.ECR_REPO_NAME }}:$IMAGE_TAG"

          docker build \
            -f python_server/Dockerfile \
            -t "$IMAGE_URI" \
            .

          docker push "$IMAGE_URI"

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_REPO=$ECR_REGISTRY/${{ env.ECR_REPO_NAME }}" >> $GITHUB_ENV

      - name: Configure kubectl for EKS
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "${{ env.CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"
          kubectl get nodes

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Reconcile app env secret from IaC outputs
        shell: bash
        run: |
          set -euo pipefail

          SECRET_ARN="$(aws cloudformation describe-stacks \
            --stack-name "${{ env.CFN_STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='${{ env.DB_URL_SECRET_OUTPUT_KEY }}'].OutputValue | [0]" \
            --output text)"

          if [ -z "${SECRET_ARN}" ] || [ "${SECRET_ARN}" = "None" ]; then
            echo "Could not resolve secret ARN from CloudFormation output key: ${{ env.DB_URL_SECRET_OUTPUT_KEY }}"
            exit 1
          fi

          DB_URL="$(aws secretsmanager get-secret-value \
            --secret-id "${SECRET_ARN}" \
            --query SecretString \
            --output text | python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["DATABASE_URL"])')"

          if [ -z "${DB_URL}" ]; then
            echo "DATABASE_URL is empty in secret: ${SECRET_ARN}"
            exit 1
          fi

          DB_URL_SQLALCHEMY="${DB_URL}"
          if [[ "${DB_URL_SQLALCHEMY}" == postgresql://* ]]; then
            DB_URL_SQLALCHEMY="postgresql+psycopg://${DB_URL_SQLALCHEMY#postgresql://}"
          elif [[ "${DB_URL_SQLALCHEMY}" == postgres://* ]]; then
            DB_URL_SQLALCHEMY="postgresql+psycopg://${DB_URL_SQLALCHEMY#postgres://}"
          fi

          ENV_FILE_CONTENT="$(printf 'NODE_ENV=production\nPYTHON_DATABASE_URL=%s\nSUPABASE_DB_URL=%s\nDATABASE_URL_PYTHON=%s\nDATABASE_URL_PYTHON_RIDERSHIP=%s' \
            "${DB_URL_SQLALCHEMY}" \
            "${DB_URL_SQLALCHEMY}" \
            "${DB_URL_SQLALCHEMY}" \
            "${DB_URL_SQLALCHEMY}")"

          kubectl create secret generic "${{ env.K8S_ENV_SECRET_NAME }}" \
            -n "${{ env.NAMESPACE }}" \
            --from-literal=.env="${ENV_FILE_CONTENT}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          set -euo pipefail

          helm upgrade --install "${{ env.RELEASE_NAME }}" "${{ env.CHART_PATH }}" \
            --namespace "${{ env.NAMESPACE }}" --create-namespace \
            --set image.repository="${{ env.IMAGE_REPO }}" \
            --set image.tag="${{ env.IMAGE_TAG }}" \
            --set service.targetPort=8000 \
            --set envFile.existingSecretName=python-server-db
