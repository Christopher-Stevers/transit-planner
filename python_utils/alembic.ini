[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Fallback only: actual runtime URL is expected from env var
# DATABASE_URL_PYTHON_RIDERSHIP (resolved in alembic/env.py).
sqlalchemy.url =
DATABASE_URL_PYTHON_RIDERSHIP=postgresql+psycopg://postgres:postgres@localhost:5434/rider_ship

[post_write_hooks]
# Example:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
